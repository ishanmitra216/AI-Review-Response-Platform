version: "3"

services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # backend will load environment from backend/.env if present.  Use this file
    # to supply OPENAI_API_KEY, DATABASE_URL, and any platform tokens.
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"